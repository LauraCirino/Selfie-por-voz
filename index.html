<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self por voz</title>
    <link rel="shortcut icon" href="https://i.postimg.cc/ZnJpPFYk/favicon.png" type="image/png">

    <!--bootstrap-->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/js/bootstrap.min.js"></script>

    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="container">
        <a href="" id="link" download="self.png"></a>
        <h1>
            App self por voz
            <img src="euu.PNG" alt="minha foto para ilustrar" id="logo-img">
        </h1>
        <hr>
        <h4 style="color: red;">Pressione permitir assim que o pop-up for exibido depois de dar um comando de voz</h4>
        <div class="form-group">
            <h3>Diga "selfie"</h3>
            <label>Sua saida de voz:</label>
            <textarea id="textbox" class="form-control" readonly="true"></textarea>
        </div>
        <button class="btn btn-primary" onclick="start()">iniciar</button>
        <p>Pressione o botão iniciar</p>
        <label >Sua webcam</label>
        <div id="camera"></div>
        <br>
        <label>Sua selfie será exibida aqui:</label>
        <div id="result"></div>
    </div>
    

    <script src="script.js"></script>
</body>
</html>
